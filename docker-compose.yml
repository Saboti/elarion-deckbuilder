services:
  postgres:
    image: postgres:16-alpine
    container_name: elarion-db
    environment:
      POSTGRES_USER: elarion
      POSTGRES_PASSWORD: elarion_secret_pw
      POSTGRES_DB: elarion_deckbuilder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elarion -d elarion_deckbuilder"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - elarion-net

  backend:
    build:
      context: ./backend
    container_name: elarion-backend
    environment:
      DATABASE_URL: postgresql://elarion:elarion_secret_pw@postgres:5432/elarion_deckbuilder
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - elarion-net

  frontend:
    build:
      context: ./frontend
    container_name: elarion-frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost
    networks:
      - elarion-net

  nginx:
    image: nginx:alpine
    container_name: elarion-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - elarion-net

volumes:
  postgres_data:
  frontend_node_modules:
  backend_node_modules:

networks:
  elarion-net:
    driver: bridge
